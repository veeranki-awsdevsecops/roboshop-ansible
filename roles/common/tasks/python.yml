#APP_PREREQ
#pip3 install -r requirements.txt
#
#SYSTEMD

- name: Install python3 gcc python3-devel
  ansible.builtin.dnf:
    name:
      - python3
      - gcc
      - python3-devel
    state: installed

- name: Load App-Prereq
  ansible.builtin.import_role:
    name: common
    task_from: app-prereq

- name: Download Dependencies
  ansible.builtin.shell: pip3 install -r requirements.txt
  args:
    chdir: /app

- name: Load SystemD Service
  ansible.builtin.import_role:
    name: common
    task_from: systemd