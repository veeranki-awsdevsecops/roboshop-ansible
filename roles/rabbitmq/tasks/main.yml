#  dnf install rabbitmq-server -y
#
#    cp rabbitmq.repo /etc/yum.repos.d/rabbitmq.repo
#
#    rabbitmqctl add_user roboshop roboshop123
#    rabbitmqctl set_permissions -p / roboshop ".*" ".*" ".*"
#
#    systemctl enable rabbitmq-server
#    systemctl start rabbitmq-server

- name: Copy rabbitmq repo file
  ansible.builtin.copy:
    src: rabbitmq.repo
    dest: /etc/yum.repos.d/rabbitmq.repo

- name: Install Rabbitmq-server
  ansible.builtin.dnf:
    name: rabbitmq-server
    state: installed

- name: Start RabbitMQ service.
  ansible.builtin.systemd_service:
    name: rabbitmq-server
    state: restarted
    enabled: true

- name: Create RabbitMQ User
  ansible.builtin.shell: rabbitmqctl add_user {{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-{{env}}/data/rabbitmq:APP_USER token={{ token }} url=http://vault-internal.veerankitek.online:8200') }} {{ lookup('community.hashi_vault.hashi_vault', 'secret=roboshop-{{env}}/data/rabbitmq:APP_PASSWORD token={{ token }} url=http://vault-internal.veerankitek.online:8200') }} ; rabbitmqctl set_permissions -p / roboshop ".*" ".*" ".*"
