- name: Disable Nginx module
  ansible.builtin.shell:
    cmd: dnf module disable nginx -y

- name: Enable Nginx module
  ansible.builtin.shell:
    cmd: dnf module enable nginx:1.24 -y

- name: Install Nginx
  ansible.builtin.dnf:
    name: nginx
    state: present

- name: Copy Proxy configuration
  ansible.builtin.copy:
    src: nginx.conf
    dest: /etc/nginx/nginx.conf

- name: Remove nginx static files
  ansible.builtin.file:
    path: /usr/share/nginx/html/*
    state: absent

- name: create nginx directory
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: directory

- name: Download and Unarchive the frontendzip
  ansible.builtin.unarchive:
    src: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
    dest: /usr/share/nginx/html
    remote_src: yes

- name: Enable the systemd
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted
    enabled: true







