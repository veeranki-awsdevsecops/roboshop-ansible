#    systemctl enable mongod
#    systemctl start mongod




    - name: Install Mongodb
      ansible.builtin.dnf:
        name: mongodb-org
        state: latest
    - name: Copy mongo repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo
        mode: "0644"